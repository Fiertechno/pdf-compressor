<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ضاغط PDF العملاق</title>
    <!-- استيراد المكتبات اللازمة للمعالجة الجرافيكية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        .drop-zone { border: 3px dashed #cbd5e1; padding: 40px 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .drop-zone:hover { border-color: var(--primary); background: #f1f5f9; }
        .settings { margin-bottom: 20px; text-align: right; background: #f8fafc; padding: 15px; border-radius: 10px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #log { margin-top: 20px; font-size: 13px; color: #64748b; max-height: 100px; overflow-y: auto; text-align: right; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 10px; display: none; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #1e293b;">ضاغط PDF فائق القوة</h2>
    <p style="color: #64748b; font-size: 14px;">يقلل الحجم عبر إعادة معالجة الصور (مثالي للملفات الضخمة)</p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">اضغط لاختيار ملف PDF (حتى 1 جيجا)</span>
        <input type="file" id="fileInput" hidden accept="application/pdf">
    </div>

    <div class="settings">
        <label>قوة الضغط: <span id="qVal">50</span>%</label>
        <input type="range" id="quality" min="10" max="90" value="50">
        <p style="font-size: 11px; color: #94a3b8; margin-top: 5px;">(نسبة أقل = حجم أصغر جداً وجودة أقل)</p>
    </div>

    <button id="processBtn" disabled>ابدأ عملية الضغط الآن</button>

    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
    <div id="log"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const log = document.getElementById('log');
    const qVal = document.getElementById('qVal');
    const qualityInput = document.getElementById('quality');
    const progBar = document.getElementById('progBar');
    const progFill = document.getElementById('progFill');

    qualityInput.oninput = () => qVal.innerText = qualityInput.value;

    fileInput.onchange = (e) => {
        if(e.target.files[0]) {
            document.getElementById('fileName').innerText = e.target.files[0].name;
            processBtn.disabled = false;
        }
    };

    function addLog(msg) {
        log.innerHTML += `<div>- ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    processBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return;

        processBtn.disabled = true;
        progBar.style.display = 'block';
        addLog("بدء قراءة الملف...");

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            const numPages = pdf.numPages;
            addLog(`تم اكتشاف ${numPages} صفحة.`);

            const pdfDoc = new jsPDF();
            const quality = parseInt(qualityInput.value) / 100;

            for (let i = 1; i <= numPages; i++) {
                addLog(`جاري معالجة صفحة ${i}...`);
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({scale: 1.5}); // تقليل المقياس يوفر مساحة ضخمة
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({canvasContext: context, viewport: viewport}).promise;
                
                // تحويل الصفحة لصورة JPEG مضغوطة
                const imgData = canvas.toDataURL('image/jpeg', quality);
                
                if (i > 1) pdfDoc.addPage();
                
                const imgProps = pdfDoc.getImageProperties(imgData);
                const pdfWidth = pdfDoc.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                
                pdfDoc.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                
                // تحديث شريط التقدم
                progFill.style.width = `${(i/numPages)*100}%`;
            }

            addLog("جاري إنشاء الملف النهائي...");
            pdfDoc.save('compressed_ultra.pdf');
            addLog("تم التحميل بنجاح!");

        } catch (err) {
            console.error(err);
            addLog("خطأ: " + err.message);
        }
        processBtn.disabled = false;
    };
</script>

</body>
</html>
