<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>زياد الكردي | ضاغط PDF الاحترافي</title>
    
    <!-- المكتبات الأساسية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #050505;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .gold-title {
            background: linear-gradient(180deg, #FFD700 0%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            background: rgba(15, 15, 15, 0.98);
            border: 1px solid #222;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        @media (min-width: 640px) {
            .main-container {
                padding: 3rem;
                border-radius: 3rem;
            }
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #1a1a1a;
            border-radius: 10px;
            cursor: pointer;
            accent-color: #10b981;
        }

        .drop-zone {
            border: 2px dashed #333;
            background: #000;
            transition: all 0.3s ease;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .drop-zone:hover {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        /* منع التحديد لزيادة احترافية الموقع */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <!-- ترويسة الموقع المستجيبة -->
    <div class="text-center mb-6 sm:mb-10 w-full px-4">
        <h1 class="text-4xl xs:text-5xl sm:text-7xl gold-title mb-2 sm:mb-4 italic">زياد الكردي</h1>
        <p class="text-emerald-500 text-sm sm:text-xl tracking-[0.2em] sm:tracking-[0.4em] font-bold uppercase">ضغط ملفات PDF بشكل احترافي</p>
    </div>

    <div class="main-container text-center">
        <!-- منطقة رفع الملف -->
        <div id="dropZone" class="drop-zone rounded-2xl sm:rounded-3xl p-6 sm:p-10 cursor-pointer mb-6 sm:mb-8 group">
            <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            <div id="uploadView" class="space-y-4">
                <div class="text-5xl sm:text-6xl group-hover:scale-110 transition-transform">📄</div>
                <p class="text-zinc-400 font-bold text-base sm:text-lg italic">اضغط لرفع ملف PDF</p>
            </div>
            <div id="fileView" class="hidden w-full overflow-hidden">
                <p id="fileName" class="text-emerald-400 font-black text-lg sm:text-xl truncate px-4"></p>
                <p id="fileSize" class="text-zinc-500 text-xs sm:text-sm mt-2"></p>
            </div>
        </div>

        <!-- إعدادات الضغط المستجيبة -->
        <div class="mb-6 sm:mb-10 px-2">
            <div class="flex justify-between items-center mb-4">
                <span class="text-zinc-300 font-bold text-sm sm:text-lg italic">نسبة الضغط:</span>
                <span id="ratioLabel" class="text-3xl sm:text-4xl font-black text-emerald-500">35%</span>
            </div>
            <input type="range" id="ratioSlider" min="1" max="70" value="35">
            <div class="flex justify-between text-[9px] sm:text-[11px] text-zinc-600 mt-4 font-black uppercase">
                <span>وضوح فائق</span>
                <span>توازن ذكي</span>
                <span>أصغر حجم</span>
            </div>
        </div>

        <!-- زر التشغيل -->
        <button id="processBtn" disabled class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-zinc-800 text-white font-black py-4 sm:py-5 rounded-xl sm:rounded-2xl transition-all shadow-xl shadow-emerald-900/40 text-lg sm:text-2xl uppercase italic tracking-tighter">
            بدء الضغط الآن ⚡
        </button>

        <!-- حالة التقدم -->
        <div id="progressCont" class="hidden mt-8 sm:mt-12">
            <div class="flex justify-between text-[10px] sm:text-sm mb-3">
                <span id="statusText" class="text-emerald-400 font-bold italic animate-pulse">جاري معالجة النصوص...</span>
                <span id="percentText" class="font-black text-xl sm:text-2xl">0%</span>
            </div>
            <div class="w-full bg-zinc-900 h-2 sm:h-3 rounded-full overflow-hidden border border-zinc-800">
                <div id="progressBar" class="h-full bg-gradient-to-r from-emerald-600 to-emerald-400 w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <!-- التذييل المستجيب -->
    <footer class="mt-8 sm:mt-14 text-zinc-700 text-[10px] sm:text-sm font-bold tracking-widest uppercase text-center px-4">
        DEVELOPED BY: <span class="text-zinc-400">ZIAD AL-KURDI</span> &copy; 2024
    </footer>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const ratioSlider = document.getElementById('ratioSlider');
        const ratioLabel = document.getElementById('ratioLabel');
        let selectedFile = null;

        ratioSlider.oninput = () => ratioLabel.innerText = ratioSlider.value + "%";

        document.getElementById('dropZone').onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('uploadView').classList.add('hidden');
                document.getElementById('fileView').classList.remove('hidden');
                document.getElementById('fileName').innerText = selectedFile.name;
                document.getElementById('fileSize').innerText = (selectedFile.size/1024/1024).toFixed(2) + " MB";
                processBtn.disabled = false;
            }
        };

        processBtn.onclick = async () => {
            const ratio = parseInt(ratioSlider.value);
            // جودة حقيقية متوازنة
            const quality = 0.98 - (ratio / 78);
            
            processBtn.disabled = true;
            document.getElementById('progressCont').classList.remove('hidden');

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdfData = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const numPages = pdfData.numPages;
                const finalPdf = await PDFDocument.create();

                for (let i = 1; i <= numPages; i++) {
                    const page = await pdfData.getPage(i);
                    // مقياس 3.0 لضمان وضوح فائق للنصوص على جميع الشاشات
                    const viewport = page.getViewport({scale: 3.0});
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d', { alpha: false });
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';

                    await page.render({canvasContext: ctx, viewport: viewport}).promise;
                    
                    const imgData = canvas.toDataURL('image/jpeg', quality);
                    const img = await finalPdf.embedJpg(imgData);
                    
                    const newPage = finalPdf.addPage([viewport.width, viewport.height]);
                    newPage.drawImage(img, { x: 0, y: 0, width: viewport.width, height: viewport.height });
                    
                    const p = Math.round((i / numPages) * 100);
                    document.getElementById('progressBar').style.width = p + "%";
                    document.getElementById('percentText').innerText = p + "%";
                    document.getElementById('statusText').innerText = `معالجة صفحة ${i} من ${numPages}...`;
                }

                const pdfBytes = await finalPdf.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "Ziad_Compressed_" + selectedFile.name;
                link.click();
                
                document.getElementById('statusText').innerText = "✅ اكتمل الضغط بنجاح!";
            } catch (err) {
                console.error(err);
                alert("تعذر المعالجة: الملف كبير جداً على ذاكرة الهاتف.");
            }
            processBtn.disabled = false;
        };
    </script>
</body>
</html>
