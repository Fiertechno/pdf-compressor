<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مضغوط PDF التوربو - GitHub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 450px; text-align: center; }
        .upload-btn { border: 2px dashed #3b82f6; padding: 30px; border-radius: 15px; cursor: pointer; margin-bottom: 20px; display: block; transition: 0.3s; }
        .upload-btn:hover { background: #334155; }
        .slider-container { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input[type="range"] { width: 100%; }
        button { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #status { margin-top: 20px; color: #94a3b8; font-size: 14px; white-space: pre-line; }
        .progress { height: 5px; background: #3b82f6; width: 0%; transition: 0.3s; margin-top: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🚀 ضاغط PDF الخارق</h2>
    <p style="font-size: 12px; color: #3b82f6;">يستهدف تقليل الحجم من 1 جيجا إلى أقل قدر ممكن</p>
    
    <label class="upload-btn" for="fileInput">
        <span id="fileName">اختر ملف PDF الكبير</span>
        <input type="file" id="fileInput" hidden accept="application/pdf">
    </label>

    <div class="slider-container">
        <label>قوة الضغط (أصغر حجم = جودة أقل)</label>
        <input type="range" id="quality" min="0.1" max="0.5" step="0.05" value="0.2">
        <div style="display: flex; justify-content: space-between; font-size: 11px;">
            <span>أصغر حجم</span>
            <span>جودة متوسطة</span>
        </div>
    </div>

    <button id="startBtn" disabled>ابدأ الضغط الآن</button>
    <div class="progress" id="progress"></div>
    <div id="status"></div>
</div>

<script>
    const { PDFDocument } = PDFLib;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let selectedFile = null;

    document.getElementById('fileInput').onchange = (e) => {
        selectedFile = e.target.files[0];
        if (selectedFile) {
            document.getElementById('fileName').innerText = selectedFile.name;
            document.getElementById('startBtn').disabled = false;
        }
    };

    document.getElementById('startBtn').onclick = async () => {
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const quality = parseFloat(document.getElementById('quality').value);

        btn.disabled = true;
        status.innerText = "جاري فتح الملف الضخم...\n(قد يتجمد المتصفح قليلاً، هذا طبيعي)";

        try {
            const arrayBuffer = await selectedFile.arrayBuffer();
            const pdfData = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            const newPdf = await PDFDocument.create();
            
            for (let i = 1; i <= pdfData.numPages; i++) {
                status.innerText = `جاري معالجة صفحة ${i} من ${pdfData.numPages}...`;
                const page = await pdfData.getPage(i);
                
                // تقليل الدقة (Scale) هو السر في تصغير الحجم
                const viewport = page.getViewport({scale: 1.0}); 
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({canvasContext: ctx, viewport: viewport}).promise;
                
                // تحويل لـ JPEG بجودة منخفضة جداً لتقليل الحجم
                const imgData = canvas.toDataURL('image/jpeg', quality);
                const img = await newPdf.embedJpg(imgData);
                
                const newPage = newPdf.addPage([viewport.width, viewport.height]);
                newPage.drawImage(img, { x: 0, y: 0, width: viewport.width, height: viewport.height });
                
                progress.style.width = (i / pdfData.numPages * 100) + "%";
            }

            status.innerText = "جاري تجميع الملف النهائي...";
            const pdfBytes = await newPdf.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Compressed_" + selectedFile.name;
            link.click();
            
            status.innerText = "✅ تم الضغط بنجاح!";
        } catch (err) {
            console.error(err);
            status.innerText = "❌ فشل الضغط: الملف كبير جداً على ذاكرة الهاتف/الكمبيوتر.";
        }
        btn.disabled = false;
    };
</script>
</body>
</html>
