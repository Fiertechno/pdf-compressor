<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زياد الكردي | Ziad Al-Kurdi PDF</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #050505;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* تصميم العلم العراقي برمجياً */
        .iraq-flag {
            width: 90px;
            height: 60px;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* تصميم علم كردستان برمجياً */
        .kurdistan-flag {
            width: 90px;
            height: 60px;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background: #f8e71c;
            border-radius: 50%;
            box-shadow: 0 0 10px #f8e71c;
        }

        .gold-title {
            background: linear-gradient(180deg, #FFD700 0%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #222;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 5px;
            accent-color: #10b981;
        }
    </style>
</head>
<body>

    <!-- قسم الأعلام البرمجي -->
    <div class="flex gap-6 mb-6">
        <!-- علم كردستان -->
        <div class="kurdistan-flag">
            <div style="flex:1; background:#ED2024;"></div>
            <div style="flex:1; background:#FFF;"></div>
            <div style="flex:1; background:#278E3C;"></div>
            <div class="sun"></div>
        </div>
        <!-- علم العراق -->
        <div class="iraq-flag">
            <div style="flex:1; background:#ED2024;"></div>
            <div style="flex:1; background:#FFF; display:flex; align-items:center; justify-content:center; font-size:10px; color:#007A3D; font-weight:bold;">الله أكبر</div>
            <div style="flex:1; background:#000;"></div>
        </div>
    </div>

    <!-- ترويسة الموقع -->
    <div class="text-center mb-8">
        <h1 class="text-6xl gold-title mb-3">زياد الكردي</h1>
        <p class="text-gray-400 text-lg tracking-[0.3em] font-bold">ضغط ملفات PDF بشكل احترافي</p>
    </div>

    <div class="glass-panel">
        <!-- منطقة الرفع -->
        <div id="dropZone" class="border-2 border-dashed border-zinc-800 rounded-3xl p-10 text-center hover:border-emerald-500 transition-all cursor-pointer mb-8 bg-black group">
            <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            <div id="uploadView">
                <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📄</div>
                <p class="text-zinc-400">اضغط لرفع ملف PDF</p>
            </div>
            <div id="fileView" class="hidden font-bold">
                <p id="fileName" class="text-emerald-400 text-xl"></p>
                <p id="fileSize" class="text-zinc-600 text-sm"></p>
            </div>
        </div>

        <!-- منزلق نسبة الضغط -->
        <div class="mb-10">
            <div class="flex justify-between items-center mb-4">
                <span class="text-zinc-300 font-bold">قوة الضغط المطلوبة:</span>
                <span id="ratioLabel" class="text-3xl font-black text-emerald-500">35%</span>
            </div>
            <input type="range" id="ratioSlider" min="1" max="70" value="35">
            <div class="flex justify-between text-[10px] text-zinc-600 mt-3 font-black uppercase">
                <span>وضوح فائق (1%)</span>
                <span>توازن احترافي</span>
                <span>أصغر حجم (70%)</span>
            </div>
        </div>

        <button id="processBtn" disabled class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-zinc-800 text-white font-black py-5 rounded-2xl transition-all shadow-2xl shadow-emerald-900/40 text-xl">
            بدء الضغط الذكي ⚡
        </button>

        <!-- حالة التقدم -->
        <div id="progressCont" class="hidden mt-10">
            <div class="flex justify-between text-xs mb-2">
                <span id="statusText" class="text-emerald-400 italic">جاري معالجة النصوص بدقة عالية...</span>
                <span id="percentText" class="font-black text-xl">0%</span>
            </div>
            <div class="w-full bg-zinc-900 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-emerald-500 w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-zinc-700 text-sm font-bold">
        DEVELOPED BY: <span class="text-zinc-400">ZIAD AL-KURDI</span> &copy; 2024
    </footer>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const ratioSlider = document.getElementById('ratioSlider');
        const ratioLabel = document.getElementById('ratioLabel');
        let selectedFile = null;

        ratioSlider.oninput = () => ratioLabel.innerText = ratioSlider.value + "%";

        document.getElementById('dropZone').onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('uploadView').classList.add('hidden');
                document.getElementById('fileView').classList.remove('hidden');
                document.getElementById('fileName').innerText = selectedFile.name;
                document.getElementById('fileSize').innerText = (selectedFile.size/1024/1024).toFixed(2) + " MB";
                processBtn.disabled = false;
            }
        };

        processBtn.onclick = async () => {
            const ratio = parseInt(ratioSlider.value);
            // تحسين: الجودة تتبع المنزلق بدقة
            const quality = 0.98 - (ratio / 78);
            
            processBtn.disabled = true;
            document.getElementById('progressCont').classList.remove('hidden');

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdfData = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const numPages = pdfData.numPages;
                const finalPdf = await PDFDocument.create();

                for (let i = 1; i <= numPages; i++) {
                    const page = await pdfData.getPage(i);
                    // السر: Scale 3.0 يمنحك نصاً حاداً جداً وواضحاً كالأصل
                    const viewport = page.getViewport({scale: 3.0});
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d', { alpha: false });
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    // تحسين الرسم للنصوص
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';

                    await page.render({canvasContext: ctx, viewport: viewport}).promise;
                    
                    const imgData = canvas.toDataURL('image/jpeg', quality);
                    const img = await finalPdf.embedJpg(imgData);
                    
                    const newPage = finalPdf.addPage([viewport.width, viewport.height]);
                    newPage.drawImage(img, { x: 0, y: 0, width: viewport.width, height: viewport.height });
                    
                    const p = Math.round((i / numPages) * 100);
                    document.getElementById('progressBar').style.width = p + "%";
                    document.getElementById('percentText').innerText = p + "%";
                    document.getElementById('statusText').innerText = `معالجة صفحة ${i} من ${numPages}...`;
                }

                const pdfBytes = await finalPdf.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "مضغوط_زياد_الكردي_" + selectedFile.name;
                link.click();
                
                document.getElementById('statusText').innerText = "✅ تمت العملية بنجاح!";
            } catch (err) {
                console.error(err);
                alert("تعذر المعالجة: الملف ضخم جداً على ذاكرة المتصفح.");
            }
            processBtn.disabled = false;
        };
    </script>
</body>
</html>
