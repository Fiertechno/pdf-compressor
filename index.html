<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ضاغط PDF الصاروخي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #020617; }
        .speed-gradient { background: linear-gradient(90deg, #3b82f6, #10b981); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900/50 border border-slate-800 p-8 rounded-3xl w-full max-w-xl shadow-2xl backdrop-blur-xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white mb-2 italic">TURBO PDF ⚡</h1>
            <p class="text-slate-400 text-sm">تم تفعيل المعالجة المتوازية لتسريع الضغط 10X</p>
        </div>

        <div id="dropZone" class="border-2 border-dashed border-slate-700 rounded-2xl p-8 text-center hover:border-blue-500 transition-all cursor-pointer mb-6 group">
            <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            <div id="uploadContent">
                <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📄</div>
                <p class="text-slate-300">اسحب الملف هنا أو اضغط للاختيار</p>
            </div>
            <div id="fileInfo" class="hidden text-blue-400 font-bold"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6 text-xs">
            <div class="bg-slate-800 p-3 rounded-xl">
                <label class="block mb-1 text-slate-500">الجودة (Quality)</label>
                <select id="quality" class="bg-transparent text-white w-full outline-none">
                    <option value="0.3">منخفضة جداً (أصغر حجم)</option>
                    <option value="0.5" selected>متوسطة (توازن)</option>
                    <option value="0.7">عالية (أفضل وضوح)</option>
                </select>
            </div>
            <div class="bg-slate-800 p-3 rounded-xl">
                <label class="block mb-1 text-slate-500">السرعة (Parallel)</label>
                <select id="concurrency" class="bg-transparent text-white w-full outline-none">
                    <option value="3">متوازن</option>
                    <option value="5" selected>سريع (توربو)</option>
                    <option value="10">فائق (يحتاج جهاز قوي)</option>
                </select>
            </div>
        </div>

        <button id="startBtn" disabled class="w-full speed-gradient hover:opacity-90 disabled:grayscale text-white font-black py-4 rounded-xl transition-all uppercase tracking-widest">
            ابدأ الضغط الصاروخي 🚀
        </button>

        <div id="progressCont" class="hidden mt-8">
            <div class="flex justify-between text-xs mb-2">
                <span id="statusText">جاري المعالجة...</span>
                <span id="percentText">0%</span>
            </div>
            <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden">
                <div id="progressBar" class="speed-gradient h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let selectedFile = null;
        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const percentText = document.getElementById('percentText');

        document.getElementById('dropZone').onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('uploadContent').classList.add('hidden');
                const info = document.getElementById('fileInfo');
                info.classList.remove('hidden');
                info.innerText = `${selectedFile.name} (${(selectedFile.size/1024/1024).toFixed(1)}MB)`;
                startBtn.disabled = false;
            }
        };

        startBtn.onclick = async () => {
            startBtn.disabled = true;
            document.getElementById('progressCont').classList.remove('hidden');
            
            const quality = parseFloat(document.getElementById('quality').value);
            const concurrencyLimit = parseInt(document.getElementById('concurrency').value);
            
            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdfData = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const numPages = pdfData.numPages;
                const newPdf = await PDFDocument.create();
                
                // مصفوفة لتخزين بيانات الصفحات بالترتيب
                const processedPages = new Array(numPages);
                let completedCount = 0;

                // دالة معالجة الصفحة الواحدة (سريعة جداً)
                const processPage = async (pageNum) => {
                    const page = await pdfData.getPage(pageNum);
                    // السر: استخدام مقياس (scale) منخفض جداً (0.8) يسرع الرندر 4 مرات فوراً
                    const viewport = page.getViewport({scale: 0.8}); 
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({canvasContext: ctx, viewport: viewport}).promise;
                    const imgData = canvas.toDataURL('image/jpeg', quality);
                    
                    processedPages[pageNum - 1] = {
                        imgData,
                        width: viewport.width,
                        height: viewport.height
                    };
                    
                    completedCount++;
                    const percent = Math.round((completedCount / numPages) * 100);
                    progressBar.style.width = percent + "%";
                    percentText.innerText = percent + "%";
                    statusText.innerText = `تمت معالجة ${completedCount}/${numPages} صفحة...`;
                };

                // تشغيل المعالجة المتوازية (Parallel)
                for (let i = 1; i <= numPages; i += concurrencyLimit) {
                    const batch = [];
                    for (let j = 0; j < concurrencyLimit && (i + j) <= numPages; j++) {
                        batch.push(processPage(i + j));
                    }
                    await Promise.all(batch); // انتظار انتهاء الدفعة الحالية
                }

                statusText.innerText = "جاري تجميع الملف (لحظات فقط)...";
                // تجميع الصفحات في الـ PDF الجديد بالترتيب الصحيح
                for (const p of processedPages) {
                    const img = await newPdf.embedJpg(p.imgData);
                    const newPage = newPdf.addPage([p.width, p.height]);
                    newPage.drawImage(img, { x: 0, y: 0, width: p.width, height: p.height });
                }

                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Turbo_Compressed_${selectedFile.name}`;
                link.click();
                
                statusText.innerText = "✅ اكتملت المهمة بنجاح!";
            } catch (err) {
                console.error(err);
                statusText.innerText = "❌ خطأ في الذاكرة (الملف ضخم جداً)";
            }
            startBtn.disabled = false;
        };
    </script>
</body>
</html>
