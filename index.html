<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المعالج الذكي PDF Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Tajawal:wght@500;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; }
        .gradient-border { border: 2px solid; border-image: linear-gradient(45deg, #3b82f6, #10b981) 1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-slate-900 border border-slate-800 shadow-2xl rounded-3xl p-8 w-full max-w-2xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">ضاغط PDF الذكي (جودة احترافية)</h1>
            <p class="text-slate-400 text-sm">توازن بين وضوح النص وصغر الحجم الفائق</p>
        </header>

        <div id="dropZone" class="bg-slate-800/50 border-2 border-dashed border-slate-700 rounded-2xl p-12 text-center hover:border-emerald-500 transition-all cursor-pointer mb-8 group">
            <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            <div id="prompt">
                <div class="text-6xl mb-4 opacity-50 group-hover:opacity-100 transition-opacity">📑</div>
                <p class="text-slate-300">اسحب الملف هنا (حتى 1 جيجا)</p>
            </div>
            <div id="fileStatus" class="hidden text-emerald-400 font-bold"></div>
        </div>

        <div class="space-y-6">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div class="flex justify-between mb-4">
                    <label class="text-sm font-bold">موازنة الجودة والحجم:</label>
                    <span id="valDisplay" class="text-emerald-400 font-bold">متوازن (جيد)</span>
                </div>
                <input type="range" id="qualitySlider" min="1" max="3" value="2" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                <div class="flex justify-between text-[10px] text-slate-500 mt-2">
                    <span>أصغر حجم (نص مقروء)</span>
                    <span>متوازن</span>
                    <span>جودة عالية (حجم أكبر)</span>
                </div>
            </div>

            <button id="startBtn" disabled class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-emerald-900/20 uppercase tracking-widest">
                تحسين وضغط الآن 🚀
            </button>
        </div>

        <div id="progressArea" class="hidden mt-10">
            <div class="flex justify-between text-xs mb-2 text-slate-400">
                <span id="statusMsg">جاري التحليل...</span>
                <span id="percentNum">0%</span>
            </div>
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-emerald-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const slider = document.getElementById('qualitySlider');
        const valDisplay = document.getElementById('valDisplay');
        
        let selectedFile = null;

        const modes = {
            1: { scale: 1.0, quality: 0.3, label: "أصغر حجم (نص مقروء)" },
            2: { scale: 1.5, quality: 0.5, label: "متوازن (جودة جيدة)" },
            3: { scale: 2.0, quality: 0.7, label: "جودة احترافية (وضوح عالٍ)" }
        };

        slider.oninput = () => valDisplay.innerText = modes[slider.value].label;

        document.getElementById('dropZone').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            if(e.target.files[0]) {
                selectedFile = e.target.files[0];
                document.getElementById('prompt').classList.add('hidden');
                document.getElementById('fileStatus').classList.remove('hidden');
                document.getElementById('fileStatus').innerText = `تم اختيار: ${selectedFile.name}`;
                startBtn.disabled = false;
            }
        };

        startBtn.onclick = async () => {
            const mode = modes[slider.value];
            startBtn.disabled = true;
            document.getElementById('progressArea').classList.remove('hidden');

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdfData = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const numPages = pdfData.numPages;
                const outPdf = await PDFDocument.create();

                // المعالجة بدفعات (أسرع وأكثر استقراراً)
                const batchSize = 4; 
                for (let i = 1; i <= numPages; i += batchSize) {
                    const tasks = [];
                    for (let j = 0; j < batchSize && (i + j) <= numPages; j++) {
                        tasks.push(renderPage(pdfData, i + j, mode));
                    }

                    const results = await Promise.all(tasks);

                    for (const res of results) {
                        const img = await outPdf.embedJpg(res.imgData);
                        const page = outPdf.addPage([res.width, res.height]);
                        page.drawImage(img, { x: 0, y: 0, width: res.width, height: res.height });
                    }

                    const progress = Math.round((Math.min(i + batchSize - 1, numPages) / numPages) * 100);
                    document.getElementById('progressBar').style.width = progress + "%";
                    document.getElementById('percentNum').innerText = progress + "%";
                    document.getElementById('statusMsg').innerText = `معالجة صفحة ${Math.min(i + batchSize - 1, numPages)} من ${numPages}...`;
                }

                document.getElementById('statusMsg').innerText = "جاري الحفظ النهائي...";
                const finalBytes = await outPdf.save();
                const blob = new Blob([finalBytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "Optimized_" + selectedFile.name;
                a.click();
                document.getElementById('statusMsg').innerText = "✅ اكتمل التحميل!";

            } catch (err) {
                console.error(err);
                document.getElementById('statusMsg').innerText = "❌ حدث خطأ في الذاكرة.";
            }
            startBtn.disabled = false;
        };

        async function renderPage(pdf, pageNum, mode) {
            const page = await pdf.getPage(pageNum);
            // السر هنا: scale=1.5 يحافظ على وضوح النص بشكل كبير جداً مقارنة بـ 0.5
            const viewport = page.getViewport({scale: mode.scale});
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { alpha: false });
            
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            // تحسين الرندر ليكون النص حاداً (Sharp)
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            await page.render({canvasContext: ctx, viewport: viewport}).promise;
            
            return {
                imgData: canvas.toDataURL('image/jpeg', mode.quality),
                width: viewport.width,
                height: viewport.height
            };
        }
    </script>
</body>
</html>
