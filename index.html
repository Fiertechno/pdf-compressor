<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الضاغط النفاث PDF Jet-Stream</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #000; overflow: hidden; }
        .glitch { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px #00f2ff; }
        .progress-glow { box-shadow: 0 0 15px #3b82f6; }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen">

    <div class="relative w-full max-w-lg p-1 bg-gradient-to-br from-blue-600 to-purple-600 rounded-3xl">
        <div class="bg-black rounded-[22px] p-8">
            <h1 class="glitch text-3xl text-center mb-2 text-cyan-400 font-bold italic tracking-tighter">HYPER COMPRESSOR</h1>
            <p class="text-center text-xs text-gray-400 mb-8 uppercase tracking-widest">تحذير: سرعة قصوى - استهلاك كامل للمعالج</p>

            <div id="dropZone" class="border-2 border-dashed border-gray-800 rounded-2xl p-12 text-center hover:bg-blue-900/20 transition-all cursor-pointer group relative overflow-hidden">
                <input type="file" id="fileInput" class="hidden" accept="application/pdf">
                <div class="relative z-10">
                    <span class="text-5xl block mb-4">⚡</span>
                    <p id="fileLabel" class="text-gray-300">ألقِ بملف الـ 1 جيجا هنا</p>
                </div>
            </div>

            <div class="mt-6 space-y-4">
                <div class="flex justify-between items-center bg-gray-900 p-3 rounded-xl border border-gray-800">
                    <span class="text-xs text-gray-400">وضع المحرك:</span>
                    <span class="text-xs font-bold text-cyan-400 uppercase">Multi-Threaded (Active)</span>
                </div>
                
                <button id="startBtn" disabled class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-xl transition-all disabled:opacity-20 disabled:cursor-not-allowed uppercase italic tracking-tighter">
                    تفعيل الضغط النفاث
                </button>
            </div>

            <div id="statusArea" class="hidden mt-8">
                <div class="flex justify-between text-[10px] text-cyan-500 mb-2 uppercase font-bold">
                    <span id="speedMsg">جاري تشغيل النواة...</span>
                    <span id="percent">0%</span>
                </div>
                <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                    <div id="bar" class="w-0 h-full bg-cyan-400 progress-glow transition-all duration-75"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const dropZone = document.getElementById('dropZone');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            if(e.target.files[0]) {
                document.getElementById('fileLabel').innerText = e.target.files[0].name;
                startBtn.disabled = false;
            }
        };

        startBtn.onclick = async () => {
            const file = fileInput.files[0];
            startBtn.disabled = true;
            document.getElementById('statusArea').classList.remove('hidden');
            
            const startTimestamp = performance.now();
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfData = await pdfjsLib.getDocument({data: arrayBuffer, verbosity: 0}).promise;
                const numPages = pdfData.numPages;
                const resultPdf = await PDFDocument.create();

                // السرعة القصوى: معالجة دفعات ضخمة (Parallel Batching)
                const CONCURRENCY = 8; // معالجة 8 صفحات في اللحظة الواحدة
                
                for (let i = 1; i <= numPages; i += CONCURRENCY) {
                    const promises = [];
                    for (let j = 0; j < CONCURRENCY && (i + j) <= numPages; j++) {
                        promises.push(renderAndCompress(pdfData, i + j));
                    }
                    
                    const pagesData = await Promise.all(promises);
                    
                    for (const data of pagesData) {
                        const img = await resultPdf.embedJpg(data.img);
                        const p = resultPdf.addPage([data.w, data.h]);
                        p.drawImage(img, { x: 0, y: 0, width: data.w, height: data.h });
                    }

                    const pDone = Math.min(100, Math.round(((i + CONCURRENCY) / numPages) * 100));
                    document.getElementById('bar').style.width = pDone + "%";
                    document.getElementById('percent').innerText = pDone + "%";
                    document.getElementById('speedMsg').innerText = `تم ضغط ${Math.min(i+CONCURRENCY-1, numPages)} من ${numPages}`;
                }

                const finalPdf = await resultPdf.save();
                const blob = new Blob([finalPdf], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `Ultra_Small_${file.name}`;
                a.click();
                
                const endTimestamp = performance.now();
                document.getElementById('speedMsg').innerText = `اكتمل في ${((endTimestamp - startTimestamp)/1000).toFixed(1)} ثانية!`;

            } catch (err) {
                console.error(err);
                alert("ذاكرة المتصفح ممتلئة! الملف ضخم جداً.");
            }
            startBtn.disabled = false;
        };

        async function renderAndCompress(pdf, pageNum) {
            const page = await pdf.getPage(pageNum);
            // لتقليل الحجم من 1 جيجا لـ 10 ميجا: يجب تقليل الـ Scale لـ 0.5 (سرعة جنونية وضغط رهيب)
            const viewport = page.getViewport({scale: 0.5}); 
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { alpha: false }); // تعطيل الألفا لتسريع الرندر
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({canvasContext: ctx, viewport: viewport}).promise;
            
            // جودة 0.1 هي المفتاح للوصول لحجم 10 ميجا
            return {
                img: canvas.toDataURL('image/jpeg', 0.15), 
                w: viewport.width,
                h: viewport.height
            };
        }
    </script>
</body>
</html>
